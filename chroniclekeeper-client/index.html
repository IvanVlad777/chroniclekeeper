<!DOCTYPE html>
<html lang="en" data-theme="stone" data-mode="night">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ChronicleKeeper</title>
        <script>
            // Primijeni spremljenu temu prije prvog rendera (FOUC guard).
            (function () {
                try {
                    var saved = localStorage.getItem("theme");
                    if (!saved) return;
                    var parts = saved.replace(/^theme-/, "").split("-");
                    var themes = ["ice", "forest", "lush", "sand", "stone"];
                    var modes = ["day", "night"];
                    if (themes.indexOf(parts[0]) !== -1 && modes.indexOf(parts[1]) !== -1) {
                        document.documentElement.dataset.theme = parts[0];
                        document.documentElement.dataset.mode = parts[1];
                    }
                } catch (e) {
                    /* localStorage nedostupan — ostaje default */
                }
            })();
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Spline+Sans+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
